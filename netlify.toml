[build]
  command = "pnpm --filter @workspace/walker-creek run build"
  publish = "artifacts/walker-creek/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT = "5173"
  BASE_PATH = "/"
  # Install devDependencies (Vite lives there). Do NOT set NODE_ENV=production here.
  PNPM_FLAGS = "--no-frozen-lockfile --prod=false"
